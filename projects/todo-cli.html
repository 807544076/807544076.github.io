      <h1>Todo CLI</h1>
    </header>
    <div class="project-content">
<p>一个用 Python 写的命令行待办事项管理工具。</p>

<h2>功能</h2>

<ul>
<li>添加、完成、删除待办事项</li>
<li>标签分类</li>
<li>优先级标记</li>
<li>全文搜索</li>
<li>数据持久化（JSON 文件）</li>
</ul>

<h2>用法</h2>

<pre><code>todo add &quot;写博客&quot; --priority high --tag writing
todo list
todo done 1</code></pre>

      
      <a class="project-link" href="https://github.com/oceanfish/todo-cli" target="_blank">查看源码 →</a>
