<p>日常开发中 Git 是离不开的工具，记录一些常用但容易忘的操作。</p>

<h2>交互式 rebase</h2>

<p>合并多个提交：</p>

<pre><code>git rebase -i HEAD~3</code></pre>

<p>把 <code>pick</code> 改成 <code>squash</code> 即可合并。</p>

<h2>快速修复上一次提交</h2>

<pre><code>git commit --amend --no-edit</code></pre>

<h2>查看某个文件的修改历史</h2>

<pre><code>git log -p -- filename</code></pre>

<h2>暂存部分改动</h2>

<pre><code>git add -p</code></pre>

<p>可以只暂存文件中的部分改动，而不是整个文件。</p>

<h2>撤销已推送的提交</h2>

<pre><code>git revert HEAD</code></pre>

<p>安全的方式，不会重写历史。</p>
