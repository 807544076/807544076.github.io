<p>最近读了几本书，记录一下。</p>

<h2>《设计模式》</h2>

<p>GoF 的经典之作。虽然现在很多模式已经被语言特性内置了，但理解背后的思想仍然很有价值。</p>

<blockquote><p>针对接口编程，而不是针对实现编程。</p></blockquote>

<h2>《CSS 权威指南》</h2>

<p>把 CSS 翻了一遍，对 <code>containing block</code> 和 <code>stacking context</code> 的理解更深了。以前写样式经常靠试，现在知道为什么了。</p>

<h2>总结</h2>

<p>技术书还是得看经典的。虽然新框架层出不穷，但底层原理变的不多。</p>
