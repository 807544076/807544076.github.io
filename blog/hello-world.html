<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>你好，世界 — Oceanfish</title>
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .post-page {
      max-width: 720px;
      margin: 80px auto 40px;
      padding: 0 20px;
    }
    .post-header {
      margin-bottom: 32px;
    }
    .post-header h1 {
      font-size: 28px;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 8px;
    }
    .post-meta {
      font-size: 13px;
      color: var(--color-text-secondary);
    }
    .post-content {
      font-size: 16px;
      line-height: 1.9;
      color: var(--color-text);
    }
    .post-content p {
      margin-bottom: 20px;
    }
    .post-back {
      display: inline-block;
      margin-top: 40px;
      color: var(--color-accent);
      transition: color var(--transition-base);
    }
    .post-back:hover {
      color: var(--color-primary);
    }
  </style>
</head>
<body>
  <article class="post-page">
    <header class="post-header">
      <h1>你好，世界</h1>
      <div class="post-meta">2026-06-30</div>
    </header>
    <div class="post-content">
      <p>这是我的个人站点第一篇文章。</p>
      <p>站点使用纯 HTML/CSS/JS 构建，零依赖部署在 GitHub Pages 上。从设计到实现，从樱花粒子到隐藏彩蛋，每行代码都是亲手写的。</p>
      <p>这里后续会记录一些技术笔记、项目复盘和日常随笔。感谢来访。</p>
    </div>
    <a class="post-back link-underline" href="../index.html">← 返回首页</a>
  </article>
</body>
</html>
