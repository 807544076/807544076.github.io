<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oceanfish</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/hero.css">
  <link rel="stylesheet" href="css/masonry.css">
  <noscript><style>.no-js-warning { display: block !important; }</style></noscript>
</head>
<body>
  <!-- hero section -->
  <section id="hero">
    <canvas id="particleCanvas"></canvas>
    <div class="hero-overlay"></div>
    <div class="hero-card" id="heroCard">
      <button class="hero-collapse-btn" id="heroCollapse" title="收起">✕</button>
      <!-- 折叠状态 -->
      <div class="hero-card-header" id="heroCardHeader">
        <div class="hero-avatar">
          <div class="avatar-placeholder">🐟</div>
        </div>
        <h1 class="hero-name">Oceanfish</h1>
        <p class="hero-bio" id="heroBio">一只在海里写代码的鱼</p>
        <div class="hero-card-hint" id="heroHint">▼</div>
      </div>

      <!-- 展开状态（简历） -->
      <div class="hero-card-body" id="heroBody">
        <div class="hero-resume">
          <div class="hero-resume-left">
            <div class="hero-resume-avatar">🐟</div>
            <div class="hero-resume-name">Oceanfish</div>
            <div class="hero-resume-bio">一只在海里写代码的鱼</div>
            <div class="hero-resume-info">
              <div class="info-item">
                <span class="info-label">🎂 生日</span>
                <span class="info-value">2002.6.16</span>
              </div>
              <div class="info-item">
                <span class="info-label">📧 邮箱</span>
                <span class="info-value">807544076@qq.com</span>
              </div>
            </div>
          </div>
          <div class="hero-resume-right" id="resumeContent">
            <div class="resume-placeholder">加载中…</div>
          </div>
        </div>
      </div>
    </div>
    <div class="scroll-hint" id="scrollHint">
      <span>Scroll</span>
      <div class="scroll-arrow">▼</div>
    </div>
  </section>

  <!-- content section -->
  <section id="content">
    <!-- 博客区 -->
    <div class="content-section">
      <h2 class="section-title">📝 博客</h2>
      <div class="masonry-grid" id="blogGrid"></div>
    </div>

    <hr class="section-divider">

    <!-- 项目区 -->
    <div class="content-section">
      <h2 class="section-title">💻 项目</h2>
      <div class="project-grid" id="projectGrid"></div>
    </div>
  </section>

  <!-- footer -->
  <footer class="site-footer">
    <p>❮ Oceanfish © 2026 ❯</p>
    <div>
      <a class="social-link link-underline" href="https://github.com/807544076" target="_blank">GitHub</a>
    </div>
    <span class="games-link" id="gamesLink" onclick="if(window.Games) Games.launch()">🎮 Games</span>
  </footer>

  <!-- 内容弹窗 -->
  <div id="contentModal" class="modal-overlay" style="display:none">
    <div class="modal-backdrop"></div>
    <div class="modal-container">
      <button class="modal-close" id="modalClose" aria-label="关闭">×</button>
      <div class="modal-inner">
        <div class="modal-left">
          <div class="modal-avatar">🐟</div>
          <div class="modal-title" id="modalTitle"></div>
          <div class="modal-meta" id="modalMeta"></div>
        </div>
        <div class="modal-right" id="modalContent"></div>
      </div>
    </div>
  </div>

  <script src="js/particles.js"></script>
  <script src="js/masonry.js"></script>
  <script src="js/easter-egg.js"></script>
  <script src="js/live2d-bridge.js"></script>
  <script src="js/games.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
